<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: black; 
            height: 100vh;
            width: 100vw;
        }

        .name-overlay {
            position: absolute;
            white-space: nowrap;
            font-family: 'Arial Black', sans-serif;
            font-size: 60px; 
            color: #ffffff;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.8);
            transition: all 4s ease-in-out; 
            display: inline-block;
            pointer-events: none; 
            opacity: 0;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxB5RPNS-JYkdSAqt-fEFrOzfE0LUvEBkS6octQoRbVctPRV2nq8Xpy2gziNNp1WH74/exec';
        let lastProcessedName = "";

        async function checkForNewName() {
            try {
                const response = await fetch(scriptUrl);
                const currentName = await response.text();

                if (currentName !== lastProcessedName && currentName.trim() !== "") {
                    lastProcessedName = currentName;
                    createNewNameElement(currentName);
                }
            } catch (error) {
                console.error("Connection Error:", error);
            }
        }

        function createNewNameElement(name) {
            const nameEl = document.createElement('div');
            nameEl.className = 'name-overlay animate-pop';
            nameEl.innerText = name;
            document.body.appendChild(nameEl);

            // Initial random position
            const startX = Math.random() * (window.innerWidth - 300);
            const startY = Math.random() * (window.innerHeight - 100);
            nameEl.style.left = startX + 'px';
            nameEl.style.top = startY + 'px';

            // Continuous movement - no clearInterval means this runs forever
            setInterval(() => {
                const maxX = window.innerWidth - nameEl.offsetWidth - 50;
                const maxY = window.innerHeight - nameEl.offsetHeight - 50;

                const randomX = Math.max(50, Math.floor(Math.random() * maxX));
                const randomY = Math.max(50, Math.floor(Math.random() * maxY));

                nameEl.style.left = randomX + "px";
                nameEl.style.top = randomY + "px";
            }, 4000);
        
        }

        setInterval(checkForNewName, 1000);
    </script>
</body>
</html>
